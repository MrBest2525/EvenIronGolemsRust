name: Build and Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Update project versions
        run: |
          # タグ名を取得 (例: v1.0.2)
          RAW_TAG=${{ github.event.release.tag_name }}
          # 頭の 'v' を除いた純粋なバージョン番号を作成 (例: 1.0.2)
          VERSION=${RAW_TAG#v}
          
          # 1. paper-plugin.yml の version 行を置換
          sed -i "s/^version: .*/version: '${VERSION}'/" src/main/resources/paper-plugin.yml
          
          # 2. build.gradle の version = '...' 行を置換
          sed -i "s/^version = .*/version = '${VERSION}'/" build.gradle
          
          echo "Updated paper-plugin.yml and build.gradle to version: ${VERSION}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
